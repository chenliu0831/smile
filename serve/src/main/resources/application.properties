# HTTP server configuration (runtime property)
quarkus.package.output-name=smile-serve
quarkus.rest.path=/api/v1
# CORS is a BUILD-TIME Quarkus property, so it must be baked into the jar (runtime -D
# has no effect). The Tauri webview fetches the daemon's REST API cross-origin; allow
# the dev (Vite :1420) and packaged (tauri://) webview origins. Loopback-bound + the
# WS session token remain the primary trust boundary (ADR-0002).
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:1420,http://127.0.0.1:1420,tauri://localhost,http://tauri.localhost,https://tauri.localhost
smile.serve.model=../model
smile.onnx.model=../model
smile.chat.model=../model/Llama3.1-8B-Instruct
smile.chat.tokenizer=../model/Llama3.1-8B-Instruct/tokenizer.model
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.build-dir=dist
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/smile
quarkus.datasource.username=postgres
quarkus.datasource.password=admin
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.active=false

# ---- Agent/LLM diagnostics (base level: the daemon runs the prod jar, NOT %dev) ----
# Surface the agent loop's per-round detail so a stalled turn is visible in daemon.log. These
# are bounded (one agent at a time) and only the daemon uses this config.
quarkus.log.category."ioa.llm".level=DEBUG
quarkus.log.category."ioa.agent".level=DEBUG
# HTTP transport logging for the LLM SDKs (OpenAI Java SDK + OkHttp), controlled by
# smile.daemon.log.http.level. Default WARN keeps daemon.log readable — a genuine transport
# error or dropped stream still surfaces — while suppressing OkHttp's very chatty HTTP/2
# frame-level DEBUG (per-frame WINDOW_UPDATE, etc., from okhttp3.internal.http2.Http2). To
# diagnose a silently-dropped Bedrock stream, raise it: -Dsmile.daemon.log.http.level=DEBUG.
quarkus.log.category."com.openai".level=${smile.daemon.log.http.level:WARN}
quarkus.log.category."okhttp3".level=${smile.daemon.log.http.level:WARN}
quarkus.log.category."okhttp3.internal".level=${smile.daemon.log.http.level:WARN}

# ---- Dev profile ----
%dev.quarkus.datasource.db-kind=sqlite
%dev.quarkus.datasource.jdbc.url=jdbc:sqlite:./smile_serve.db
%dev.quarkus.hibernate-orm.active=true
%dev.quarkus.http.port=8888
%dev.quarkus.log.level=DEBUG
%dev.smile.chat.device=7
# Allow the Tauri webview dev server (Vite on :1420) to reach the daemon's
# REST + WebSocket endpoints during development (ADR-0002).
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:1420,http://127.0.0.1:1420

# ---- Test profile ----
%test.smile.serve.model=serve/src/test/resources/model
%test.smile.onnx.model=serve/src/test/resources/model
# Use an in-memory H2 database so tests are hermetic and fast.
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.active=true
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
# Point at a non-existent path so ChatService starts in unavailable state
# without attempting to load a real GPU model during tests.
%test.smile.chat.model=serve/src/test/resources/no-such-model
%test.smile.chat.tokenizer=serve/src/test/resources/no-such-tokenizer
